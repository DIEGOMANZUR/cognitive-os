name: CI

on:
  push:
    branches: [main, master, "codex/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cognitive-os/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "cognitive-os/backend/uv.lock"
      - name: Sync dependencies
        run: uv sync --frozen --extra openharness --group dev
      - name: Lint (ruff)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
      - name: Type check (mypy)
        run: uv run mypy src
      - name: Test (pytest)
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cognitive-os/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cognitive-os/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
