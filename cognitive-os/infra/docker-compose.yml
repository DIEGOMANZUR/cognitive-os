services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cognitive_os_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cognitive_os_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - cognitive_os_net

  redis:
    image: redis:7-alpine
    container_name: cognitive_os_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Bind to loopback on the host so Redis is not reachable on LAN/WAN interfaces
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - cognitive_os_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - cognitive_os_net

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.29.0
    container_name: cognitive_os_weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true" # pragma: allowlist secret
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY} # pragma: allowlist secret
      AUTHENTICATION_APIKEY_USERS: local-admin # pragma: allowlist secret
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    ports:
      - "127.0.0.1:${WEAVIATE_HTTP_PORT:-8081}:8080"
      - "127.0.0.1:${WEAVIATE_GRPC_PORT:-50052}:50051"
    volumes:
      - cognitive_os_weaviate_data:/var/lib/weaviate
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --spider http://127.0.0.1:8080/v1/.well-known/ready || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - cognitive_os_net

  neo4j:
    image: neo4j:5-community
    container_name: cognitive_os_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7475}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7688}:7687"
    volumes:
      - cognitive_os_neo4j_data:/data
      - cognitive_os_neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "username=\"$${NEO4J_AUTH%%/*}\"; password=\"$${NEO4J_AUTH#*/}\"; cypher-shell -u \"$$username\" -p \"$$password\" 'RETURN 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - cognitive_os_net

networks:
  cognitive_os_net:
    name: cognitive_os_net

volumes:
  cognitive_os_postgres_data:
  cognitive_os_redis_data:
  cognitive_os_weaviate_data:
  cognitive_os_neo4j_data:
  cognitive_os_neo4j_logs:
