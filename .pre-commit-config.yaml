repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=1024
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        # Versioned baseline keeps the suppressed-but-known set stable. Adding a
        # new secret-looking string requires regenerating with:
        #   uvx --from detect-secrets detect-secrets scan > .secrets.baseline
        # Two clean scans in a row mean the result set is empty; if a new
        # finding appears, audit it with `detect-secrets audit .secrets.baseline`
        # before bumping the file.
        args:
          - --baseline
          - .secrets.baseline
