<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#070a12" />
  <title>Cognitive OS — sin conexión</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04060c;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.12);
      --text: #f1f3fa;
      --muted: #aab4cb;
      --accent: #5fe3cf;
      --accent-deep: #1aa491;
      --ink: #052520;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      display: grid; place-items: center; padding: 32px;
      background:
        radial-gradient(60vw 60vw at 10% 10%, rgba(95,227,207,0.18), transparent 60%),
        radial-gradient(50vw 50vw at 90% 90%, rgba(139,147,255,0.15), transparent 60%),
        var(--bg);
    }
    .card {
      max-width: 420px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      backdrop-filter: blur(18px);
      box-shadow: 0 32px 70px -28px rgba(0,0,0,0.7);
      text-align: center;
    }
    .mark {
      width: 56px; height: 56px; margin: 0 auto 14px;
      border-radius: 14px;
      background: linear-gradient(150deg, var(--accent), var(--accent-deep));
      display: grid; place-items: center;
      box-shadow: 0 12px 32px -10px rgba(95,227,207,0.4);
    }
    h1 { margin: 0 0 8px; font-size: 20px; letter-spacing: -0.01em; }
    p { margin: 0 0 8px; color: var(--muted); line-height: 1.55; }
    .small { color: rgba(170,180,203,0.7); font-size: 12.5px; }
    button {
      margin-top: 18px; padding: 10px 16px; border-radius: 10px;
      background: linear-gradient(180deg, #8df4e6, #5fe3cf);
      color: var(--ink); font-weight: 650; border: none; cursor: pointer;
      box-shadow: 0 8px 24px -8px rgba(95,227,207,0.45);
    }
    button:hover { filter: brightness(1.07); }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#052520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8.8a16 16 0 0 1 4.5-2.6"/>
        <path d="M9.7 4.4a16 16 0 0 1 11.3 4.4"/>
        <path d="M5 12.6a10 10 0 0 1 3-1.9"/>
        <path d="M14 11a10 10 0 0 1 4 2"/>
        <path d="M8.6 16.4a5 5 0 0 1 6.8 0"/>
        <path d="M12 20h.01"/>
        <path d="m2 2 20 20"/>
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>El cockpit del Cognitive OS está corriendo offline. Las consultas en vivo a la API quedarán en pausa hasta que vuelvas a tener red.</p>
    <p class="small">Lo que ya estaba cacheado sigue visible. Reintentá cuando vuelvas online.</p>
    <button onclick="location.reload()" type="button">Reintentar</button>
  </main>
</body>
</html>
